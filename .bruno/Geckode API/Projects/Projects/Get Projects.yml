info:
  name: Get Projects
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseURL}}{{projectsAPI}}?ordering=id"
  params:
    - name: search
      value: fork
      type: query
      disabled: true
    - name: is_published
      value: "true"
      type: query
      disabled: true
    - name: owner
      value: "1"
      type: query
      disabled: true
    - name: page
      value: "2"
      type: query
      disabled: true
    - name: limit
      value: "4"
      type: query
      disabled: true
    - name: ordering
      value: id
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
